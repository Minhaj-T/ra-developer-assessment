name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - ci/vercel-deployment
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Type Check, and Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npx tsc --noEmit

      - name: Run component tests
        run: npm test

  deploy:
    name: Deploy to Vercel
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs: quality
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TARGET: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Verify deployment configuration
        run: |
          for variable in \
            NEXT_PUBLIC_SANITY_DATASET \
            NEXT_PUBLIC_SANITY_PROJECT_ID \
            NEXT_PUBLIC_SUPABASE_ANON_KEY \
            NEXT_PUBLIC_SUPABASE_URL \
            VERCEL_ORG_ID \
            VERCEL_PROJECT_ID \
            VERCEL_TOKEN
          do
            if [ -z "${!variable}" ]; then
              echo "::error::$variable is not configured in GitHub Actions secrets"
              exit 1
            fi
          done

      - name: Pull Vercel environment
        run: vercel pull --yes --environment="$VERCEL_TARGET" --token="$VERCEL_TOKEN"

      - name: Build application
        run: |
          if [ "$VERCEL_TARGET" = "production" ]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy application
        run: |
          if [ "$VERCEL_TARGET" = "production" ]; then
            vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
          else
            vercel deploy --prebuilt --token="$VERCEL_TOKEN"
          fi
